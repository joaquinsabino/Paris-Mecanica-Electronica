<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario - Paris Fuel Injection</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f2f2f2;
        }

        header{
            background:#001F5B;
            color:white;
            padding:20px;
            text-align:center;
        }

        .contenedor{
            width:600px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h2{
            color:#001F5B;
            margin-bottom:20px;
            text-align:center;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:15px;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        textarea{
            resize:none;
        }

        .radio,
        .check{
            width:auto;
            margin-right:8px;
        }

        .boton{
            width:100%;
            background:#001F5B;
            color:white;
            border:none;
            padding:15px;
            margin-top:25px;
            font-size:18px;
            cursor:pointer;
        }

        .boton:hover{
            background:#003b9b;
        }

    </style>

</head>

<body>

<header>

<h1>Formulario de Contacto</h1>

</header>

<div class="contenedor">

<form>

<label>Nombre</label>
<input type="text" name="nombre" required>

<label>Apellido</label>
<input type="text" name="apellido" required>

<label>Correo electrónico</label>
<input type="email" name="correo" required>

<label>Teléfono</label>
<input type="tel" name="telefono">

<label>Fecha para el turno</label>
<input type="date" name="fecha">

<label>Tipo de servicio</label>

<select name="servicio">

<option>Diagnóstico</option>
<option>Cambio de aceite</option>
<option>Inyección electrónica</option>
<option>Cambio de correa</option>
<option>Otro</option>

</select>

<label>¿Cómo desea que lo contactemos?</label>

<input class="radio" type="radio" name="contacto">
WhatsApp

<input class="radio" type="radio" name="contacto">
Correo electrónico

<br><br>

<input class="check" type="checkbox">
Acepto los términos y condiciones.

<label>Mensaje</label>

<textarea rows="6"></textarea>

<input class="boton" type="submit" value="Enviar">

</form>

</div>

</body>
</html>
